let activeFilter = "all";
let searchQuery = "";

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark class="highlight">$1</mark>');
}

function renderCards(data) {
  const container = document.getElementById('results');
  const countEl = document.getElementById('results-count');

  if (data.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <h3>No results found</h3>
        <p>Try a different name, or check if the POS uses Authorize.net as a gateway.</p>
      </div>`;
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `${data.length} result${data.length !== 1 ? 's' : ''}`;

  const q = searchQuery.toLowerCase();

  container.innerHTML = data.map(pos => {
    const typeLabel = {
      native: "Native",
      posplus: "POS+",
      gateway: "Gateway",
      unsupported: "Not Supported"
    }[pos.type];

    const badgeClass = {
      native: "badge-native",
      posplus: "badge-posplus",
      gateway: "badge-gateway",
      unsupported: "badge-unsupported"
    }[pos.type];

    const actionClass = {
      native: "action-native",
      posplus: "action-posplus",
      gateway: "action-gateway",
      unsupported: "action-unsupported"
    }[pos.type];

    return `
      <div class="card ${pos.type}">
        <div class="card-header">
          <div class="pos-name">${highlight(pos.name, searchQuery)}</div>
          <span class="badge ${badgeClass}">${typeLabel}</span>
        </div>
        <div class="card-processor">${highlight(pos.processor, searchQuery)}</div>
        <div class="card-vertical">${pos.vertical}</div>
        <div class="card-notes">${highlight(pos.notes, searchQuery)}</div>
        <span class="card-action ${actionClass}">&rarr; ${pos.action}</span>
      </div>`;
  }).join('');
}

function filterAndRender() {
  let data = POS_DATA;

  if (activeFilter !== "all") {
    data = data.filter(p => p.type === activeFilter);
  }

  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    data = data.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.processor.toLowerCase().includes(q) ||
      p.vertical.toLowerCase().includes(q) ||
      p.notes.toLowerCase().includes(q)
    );
  }

  // Sort: native first, then posplus, gateway, unsupported
  const order = { native: 0, posplus: 1, gateway: 2, unsupported: 3 };
  data.sort((a, b) => order[a.type] - order[b.type] || a.name.localeCompare(b.name));

  renderCards(data);
}

// Search input
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  filterAndRender();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    filterAndRender();
  });
});

// Initial render
filterAndRender();

// Auto-focus search on load
window.addEventListener('load', () => {
  document.getElementById('search').focus();
});
