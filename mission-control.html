<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllProPay Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --bg-panel:    #161b22;
      --bg-card:     #1c2330;
      --bg-hover:    #21262d;
      --border:      #30363d;
      --border-light:#3d444d;
      --text:        #e6edf3;
      --text-muted:  #7d8590;
      --text-dim:    #484f58;
      --blue-dark:   #2c5282;
      --blue:        #4299e1;
      --blue-bright: #63b3ed;
      --blue-glow:   rgba(66,153,225,0.15);
      --green:       #3fb950;
      --green-dim:   rgba(63,185,80,0.15);
      --yellow:      #d29922;
      --red:         #f85149;
      --pulse-color: #4299e1;
      --radius:      10px;
      --radius-sm:   6px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #0d1117 0%, #111827 50%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(66,153,225,0.35);
    }

    .brand-text h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1.2;
    }

    .brand-text p {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .max-status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s;
    }

    .max-status:hover { border-color: var(--blue); }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-green 2s ease-in-out infinite;
    }

    .status-dot.working {
      background: var(--blue);
      animation: pulse-blue 1.5s ease-in-out infinite;
    }

    .status-dot.idle {
      background: var(--yellow);
      animation: none;
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.6); }
      50%       { box-shadow: 0 0 0 5px rgba(63,185,80,0); }
    }

    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 0 rgba(66,153,225,0.7); }
      50%       { box-shadow: 0 0 0 6px rgba(66,153,225,0); }
    }

    #status-label { color: var(--text); }

    /* ── STATS BAR ──────────────────────────────────────── */
    .stats-bar {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .stats-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
      height: 46px;
      overflow-x: auto;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      border-right: 1px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .stat-item:first-child { padding-left: 0; }

    .stat-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--blue);
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .progress-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 20px;
      min-width: 120px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-width: 60px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue-dark), var(--blue));
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    /* ── MAIN LAYOUT ────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 20px;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; padding: 16px; }
    }

    /* ── PANELS ─────────────────────────────────────────── */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .panel:hover { border-color: var(--border-light); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .panel-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-active  { background: var(--blue); animation: pulse-blue 1.5s ease-in-out infinite; }
    .dot-queue   { background: var(--yellow); }
    .dot-done    { background: var(--green); }
    .dot-action  { background: #9b59b6; }

    .panel-count {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
    }

    .panel-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 420px;
      overflow-y: auto;
    }

    /* custom scrollbar */
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── TASK CARDS ─────────────────────────────────────── */
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      cursor: default;
      position: relative;
    }

    .task-card:hover {
      border-color: var(--border-light);
      background: var(--bg-hover);
      transform: translateX(2px);
    }

    .task-card.active-task {
      border-color: rgba(66,153,225,0.3);
      background: linear-gradient(135deg, rgba(44,82,130,0.2) 0%, var(--bg-card) 100%);
    }

    .task-card.active-task::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--blue);
      border-radius: 3px 0 0 3px;
    }

    .task-icon {
      font-size: 0.9rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .task-info { flex: 1; min-width: 0; }

    .task-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }

    .task-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-card:hover .task-actions { opacity: 1; }

    .btn-icon {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      transition: background 0.15s, color 0.15s;
    }

    .btn-icon:hover { background: var(--border); color: var(--text); }
    .btn-icon.complete:hover { background: var(--green-dim); color: var(--green); }
    .btn-icon.delete:hover   { background: rgba(248,81,73,0.15); color: var(--red); }

    /* working shimmer on active tasks */
    .working-shimmer {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
    }

    .shimmer-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--blue);
      animation: shimmer-bounce 1.4s ease-in-out infinite;
    }

    .shimmer-dot:nth-child(2) { animation-delay: 0.2s; }
    .shimmer-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes shimmer-bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40%            { transform: scale(1.2); opacity: 1; }
    }

    .working-label {
      font-size: 0.68rem;
      color: var(--blue);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* queue position badge */
    .queue-num {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--border);
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
    }

    /* completed timestamp */
    .done-time {
      font-size: 0.68rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .done-check {
      color: var(--green);
      font-size: 0.9rem;
    }

    /* ── ACTION ITEMS (CHECKLIST) ───────────────────────── */
    .phase-section { margin-bottom: 4px; }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .phase-header:hover { background: var(--bg-hover); }

    .phase-name {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      flex: 1;
    }

    .phase-progress {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
    }

    .phase-chevron {
      color: var(--text-dim);
      font-size: 0.7rem;
      transition: transform 0.2s;
    }

    .phase-chevron.open { transform: rotate(90deg); }

    .phase-items {
      padding: 4px 0 0 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
      cursor: pointer;
    }

    .checklist-item:hover { background: var(--bg-hover); }

    .checklist-item input[type="checkbox"] {
      appearance: none;
      width: 15px;
      height: 15px;
      border: 1.5px solid var(--border-light);
      border-radius: 3px;
      flex-shrink: 0;
      cursor: pointer;
      margin-top: 1px;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .checklist-item input[type="checkbox"]:checked {
      background: var(--blue);
      border-color: var(--blue);
    }

    .checklist-item input[type="checkbox"]:checked::after {
      content: '&#10003;';
      position: absolute;
      top: -1px;
      left: 1px;
      font-size: 10px;
      color: white;
      font-weight: 700;
    }

    .checklist-label {
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.4;
      transition: color 0.15s, text-decoration 0.15s;
    }

    .checklist-item.checked .checklist-label {
      color: var(--text-dim);
      text-decoration: line-through;
    }

    /* ── ADD TASK MODAL ─────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      border: none;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(66,153,225,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fab:hover {
      transform: scale(1.08) rotate(15deg);
      box-shadow: 0 6px 28px rgba(66,153,225,0.7);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      transform: translateY(20px);
      transition: transform 0.2s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 9px 12px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--blue);
    }

    .form-group select option { background: var(--bg-panel); }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }

    .btn-primary {
      background: var(--blue);
      color: white;
    }

    .btn-primary:hover { background: var(--blue-bright); }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 28px 16px;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    /* ── FULL WIDTH ─────────────────────────────────────── */
    .full-width { grid-column: 1 / -1; }

    /* ── TOAST ──────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 90px;
      right: 28px;
      background: var(--bg-card);
      border: 1px solid var(--green);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 0.82rem;
      color: var(--green);
      z-index: 400;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      pointer-events: none;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── DRAG HANDLE ────────────────────────────────────── */
    .drag-handle {
      color: var(--text-dim);
      cursor: grab;
      font-size: 0.9rem;
      flex-shrink: 0;
      padding: 0 2px;
    }

    .drag-handle:active { cursor: grabbing; }

    .task-card.dragging {
      opacity: 0.5;
      border-color: var(--blue);
    }

    .task-card.drag-over {
      border-color: var(--blue);
      background: var(--blue-glow);
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .brand-text p { display: none; }
      .stats-bar { padding: 0 16px; }
      main { padding: 12px; gap: 12px; }
      .fab { bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">&#x2694;&#xFE0F;</div>
      <div class="brand-text">
        <h1>AllProPay Mission Control</h1>
        <p>Powered by Max · Command &amp; Execute</p>
      </div>
    </div>
    <div class="header-right">
      <div class="max-status" id="status-toggle" title="Click to cycle status">
        <div class="status-dot working" id="status-dot"></div>
        <span id="status-label">Working</span>
      </div>
    </div>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-item">
      <span class="stat-value" id="stat-done">0</span>
      <span class="stat-label">Done Today</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-active">0</span>
      <span class="stat-label">Active</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-queue">0</span>
      <span class="stat-label">In Queue</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-pct">0%</span>
      <span class="stat-label">Complete</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <!-- Active Tasks -->
  <div class="panel" id="panel-active">
    <div class="panel-header">
      <div class="panel-title">
        <span class="dot dot-active"></span>
        Active &mdash; Max Is Working On
      </div>
      <span class="panel-count" id="count-active">0</span>
    </div>
    <div class="panel-body" id="list-active"></div>
  </div>

  <!-- Queue -->
  <div class="panel" id="panel-queue">
    <div class="panel-header">
      <div class="panel-title">
        <span class="dot dot-queue"></span>
        Up Next &mdash; Queue
      </div>
      <span class="panel-count" id="count-queue">0</span>
    </div>
    <div class="panel-body" id="list-queue"></div>
  </div>

  <!-- Completed -->
  <div class="panel" id="panel-done">
    <div class="panel-header">
      <div class="panel-title">
        <span class="dot dot-done"></span>
        Completed Today
      </div>
      <span class="panel-count" id="count-done">0</span>
    </div>
    <div class="panel-body" id="list-done"></div>
  </div>

  <!-- Action Items -->
  <div class="panel" id="panel-action">
    <div class="panel-header">
      <div class="panel-title">
        <span class="dot dot-action"></span>
        AllProPay Action Items
      </div>
      <span class="panel-count" id="count-action">0</span>
    </div>
    <div class="panel-body" id="list-action"></div>
  </div>
</main>

<!-- FAB -->
<button class="fab" id="fab-open" title="Add Task">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>&#x2694;&#xFE0F; Add New Task</h2>
    <div class="form-group">
      <label>Task Name</label>
      <input type="text" id="new-task-name" placeholder="Describe the task..." />
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="new-task-cat">
        <option value="active">🔵 Active (working now)</option>
        <option value="queue" selected>🟡 Queue (up next)</option>
        <option value="done">&#x2705; Completed</option>
      </select>
    </div>
    <div class="form-group">
      <label>Note (optional)</label>
      <textarea id="new-task-note" rows="2" placeholder="Any context or details..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-add">Add Task</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  /* ── DEFAULTS ─────────────────────────────────────────── */
  const now = Date.now();
  const today = new Date().toDateString();

  function ts(minutesAgo) {
    return now - minutesAgo * 60000;
  }

  const DEFAULTS = {
    status: 'idle',
    active: [],
    queue: [
      { id: uid(), name: 'Morning brief cron (7:00am EST) - pending #morning-brief channel' },
      { id: uid(), name: 'Pull + analyze proposal sheets from Drive - waiting on Chris upload' },
      { id: uid(), name: 'Full payroll/comp analysis + career ladder draft' },
      { id: uid(), name: 'CS incentive structure proposal (Katie + future CS hires)' },
      { id: uid(), name: 'Lead campaign builder UI (232K database - filter - export CSV)' },
      { id: uid(), name: 'Rana Zoho sprint plan summary' },
      { id: uid(), name: 'Opener live sheet 2025 trend analysis' },
      { id: uid(), name: 'AllProPay GitHub Hub - ongoing updates' },
    ],
    done: [
      { id: uid(), name: 'Initial setup + memory system',                          ts: ts(2880) },
      { id: uid(), name: 'AllProPay context download (P&L + growth strategy)',      ts: ts(2800) },
      { id: uid(), name: 'Project manager system',                                  ts: ts(2700) },
      { id: uid(), name: 'Discord channels setup',                                  ts: ts(2600) },
      { id: uid(), name: 'Daily team message scheduled (8:30am EST weekdays)',      ts: ts(2500) },
      { id: uid(), name: 'Activation rate + clawback analysis',                     ts: ts(2400) },
      { id: uid(), name: 'NMFC research for Amanda',                                ts: ts(2300) },
      { id: uid(), name: 'Opener scripts research',                                 ts: ts(2200) },
      { id: uid(), name: 'Opener performance analysis (2025 data)',                 ts: ts(2100) },
      { id: uid(), name: 'Zoho CRM full audit + Rana sprint plan',                  ts: ts(2000) },
      { id: uid(), name: 'Calculator assessment + rebuild spec',                    ts: ts(1900) },
      { id: uid(), name: 'POS lookup tool built',                                   ts: ts(1800) },
      { id: uid(), name: 'CS Call Guide for Katie',                                 ts: ts(1700) },
      { id: uid(), name: 'LTL Calculator for Amanda (hosted on GitHub)',            ts: ts(1600) },
      { id: uid(), name: 'Sales leaderboard tool built',                            ts: ts(1500) },
      { id: uid(), name: 'FluidPay booking demo built',                             ts: ts(1400) },
      { id: uid(), name: 'AllProPay Hub - GitHub Pages live',                       ts: ts(60)   },
      { id: uid(), name: 'Mission Control updated + pushed to GitHub',              ts: ts(5)    },
    ],
    phases: [
      {
        id: 'phase1',
        name: 'Phase 1 &mdash; Operational Foundation',
        open: true,
        items: [
          { id: uid(), text: 'Implement transfer routing in Zoho',             done: false },
          { id: uid(), text: 'Remove Kurt from closer queues',                 done: false },
          { id: uid(), text: 'Pull 10-15 Matt call recordings for review',     done: false },
          { id: uid(), text: 'Enable JustCall auto-dialer + local presence',   done: false },
          { id: uid(), text: 'Build Jr/Mid-Sr opener tier structure',          done: false },
          { id: uid(), text: 'Create Jr warm lead submission template',        done: false },
          { id: uid(), text: 'Build 5-touch closer follow-up sequence in Zoho', done: false },
          { id: uid(), text: 'Export active HubSpot transfers before migration', done: false },
          { id: uid(), text: 'Launch weekly KPI scorecard',                    done: false },
          { id: uid(), text: 'Start auto repair vertical playbook',            done: false },
          { id: uid(), text: 'Matt coaching gate (Day 30)',                    done: false },
        ],
      },
      {
        id: 'phase2',
        name: 'Phase 2 &mdash; Scale & Systems',
        open: false,
        items: [
          { id: uid(), text: 'Build out Gemini Gem library (all 8 gems)',      done: false },
          { id: uid(), text: 'Launch lead scraping pipeline',                  done: false },
          { id: uid(), text: 'Begin AllProPay website rebuild',                done: false },
          { id: uid(), text: 'Complete Zoho migration from HubSpot',           done: false },
          { id: uid(), text: 'FluidPay booking software evaluation',           done: false },
        ],
      },
      {
        id: 'phase3',
        name: 'Phase 3 &mdash; Growth & Domination',
        open: false,
        items: [
          { id: uid(), text: 'Expand to 3 new verticals',                      done: false },
          { id: uid(), text: 'Hire and onboard Jr openers',                    done: false },
          { id: uid(), text: 'Launch outbound auto-dialer campaign',           done: false },
          { id: uid(), text: 'Build full reporting dashboard for Chris',       done: false },
        ],
      },
    ],
    doneDate: today,
  };

  /* ── STORAGE ──────────────────────────────────────────── */
  const DATA_VERSION = '2026-03-24-v3'; // bump this to force a reset

  function load() {
    try {
      const raw = localStorage.getItem('allpropay_mc');
      if (!raw) return null;
      const data = JSON.parse(raw);
      // force reset if version mismatch
      if (data.version !== DATA_VERSION) return null;
      // reset done list if it's a new day
      if (data.doneDate !== today) {
        data.done = [];
        data.doneDate = today;
      }
      return data;
    } catch (e) { return null; }
  }

  function save(state) {
    try { localStorage.setItem('allpropay_mc', JSON.stringify(state)); } catch (e) {}
  }

  let state = load() || JSON.parse(JSON.stringify({ ...DEFAULTS, version: DATA_VERSION, doneDate: today }));

  /* ── UTILS ────────────────────────────────────────────── */
  function uid() {
    return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  }

  function fmtTime(timestamp) {
    const d = new Date(timestamp);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  /* ── STATUS ───────────────────────────────────────────── */
  const statusCycle = ['working', 'online', 'idle'];
  const statusLabel = { working: 'Working', online: 'Online', idle: 'Idle' };
  const statusClass = { working: 'working', online: '', idle: 'idle' };

  function renderStatus() {
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('status-label');
    dot.className = 'status-dot ' + (statusClass[state.status] || '');
    lbl.textContent = statusLabel[state.status] || state.status;
  }

  document.getElementById('status-toggle').addEventListener('click', () => {
    const i = statusCycle.indexOf(state.status);
    state.status = statusCycle[(i + 1) % statusCycle.length];
    renderStatus();
    save(state);
  });

  /* ── STATS ────────────────────────────────────────────── */
  function renderStats() {
    const total = state.active.length + state.queue.length + state.done.length;
    const pct = total ? Math.round((state.done.length / total) * 100) : 0;
    document.getElementById('stat-done').textContent   = state.done.length;
    document.getElementById('stat-active').textContent = state.active.length;
    document.getElementById('stat-queue').textContent  = state.queue.length;
    document.getElementById('stat-pct').textContent    = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  /* ── ACTIVE LIST ──────────────────────────────────────── */
  function renderActive() {
    const el = document.getElementById('list-active');
    document.getElementById('count-active').textContent = state.active.length;
    if (!state.active.length) {
      el.innerHTML = '<div class="empty-state">Nothing active right now.</div>';
      return;
    }
    el.innerHTML = state.active.map(t => `
      <div class="task-card active-task" data-id="${t.id}" data-list="active">
        <span class="task-icon">🔵</span>
        <div class="task-info">
          <div class="task-name">${esc(t.name)}</div>
          ${t.note ? `<div class="task-meta">${esc(t.note)}</div>` : ''}
          <div class="working-shimmer">
            <div class="shimmer-dot"></div>
            <div class="shimmer-dot"></div>
            <div class="shimmer-dot"></div>
            <span class="working-label">Processing</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn-icon complete" title="Mark complete" onclick="completeTask('active','${t.id}')">&#10003;</button>
          <button class="btn-icon" title="Move to queue" onclick="moveTask('active','queue','${t.id}')">&darr;</button>
          <button class="btn-icon delete" title="Delete" onclick="deleteTask('active','${t.id}')">&#10005;</button>
        </div>
      </div>
    `).join('');
  }

  /* ── QUEUE LIST ───────────────────────────────────────── */
  let dragSrc = null;

  function renderQueue() {
    const el = document.getElementById('list-queue');
    document.getElementById('count-queue').textContent = state.queue.length;
    if (!state.queue.length) {
      el.innerHTML = '<div class="empty-state">Queue is empty &mdash; good work! &#x2694;&#xFE0F;</div>';
      return;
    }
    el.innerHTML = state.queue.map((t, i) => `
      <div class="task-card" data-id="${t.id}" data-list="queue" data-index="${i}"
           draggable="true">
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="queue-num">${i + 1}</span>
        <div class="task-info">
          <div class="task-name">${esc(t.name)}</div>
          ${t.note ? `<div class="task-meta">${esc(t.note)}</div>` : ''}
        </div>
        <div class="task-actions">
          <button class="btn-icon" title="Move to active" onclick="moveTask('queue','active','${t.id}')">▲</button>
          <button class="btn-icon complete" title="Mark complete" onclick="completeTask('queue','${t.id}')">&#10003;</button>
          <button class="btn-icon delete" title="Delete" onclick="deleteTask('queue','${t.id}')">&#10005;</button>
        </div>
      </div>
    `).join('');

    // drag-to-reorder
    el.querySelectorAll('.task-card[draggable]').forEach(card => {
      card.addEventListener('dragstart', e => {
        dragSrc = card;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        el.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        if (card !== dragSrc) card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (!dragSrc || dragSrc === card) return;
        const from = parseInt(dragSrc.dataset.index);
        const to   = parseInt(card.dataset.index);
        const [item] = state.queue.splice(from, 1);
        state.queue.splice(to, 0, item);
        save(state);
        renderQueue();
        renderStats();
      });
    });
  }

  /* ── DONE LIST ────────────────────────────────────────── */
  function renderDone() {
    const el = document.getElementById('list-done');
    document.getElementById('count-done').textContent = state.done.length;
    if (!state.done.length) {
      el.innerHTML = '<div class="empty-state">Nothing completed yet today.</div>';
      return;
    }
    // show newest first
    const sorted = [...state.done].reverse();
    el.innerHTML = sorted.map(t => `
      <div class="task-card" data-id="${t.id}" data-list="done">
        <span class="done-check">&#x2705;</span>
        <div class="task-info">
          <div class="task-name" style="color:var(--text-muted);text-decoration:line-through">${esc(t.name)}</div>
          <div class="done-time">Completed at ${fmtTime(t.ts || Date.now())}</div>
        </div>
        <div class="task-actions">
          <button class="btn-icon delete" title="Remove" onclick="deleteTask('done','${t.id}')">&#10005;</button>
        </div>
      </div>
    `).join('');
  }

  /* ── ACTION ITEMS ─────────────────────────────────────── */
  function renderAction() {
    const el = document.getElementById('list-action');
    const totalItems = state.phases.reduce((a, p) => a + p.items.length, 0);
    const doneItems  = state.phases.reduce((a, p) => a + p.items.filter(i => i.done).length, 0);
    document.getElementById('count-action').textContent = `${doneItems}/${totalItems}`;

    el.innerHTML = state.phases.map(phase => {
      const total = phase.items.length;
      const done  = phase.items.filter(i => i.done).length;
      return `
        <div class="phase-section" data-phase="${phase.id}">
          <div class="phase-header" onclick="togglePhase('${phase.id}')">
            <span class="phase-name">${esc(phase.name)}</span>
            <span class="phase-progress">${done}/${total}</span>
            <span class="phase-chevron ${phase.open ? 'open' : ''}">▶</span>
          </div>
          ${phase.open ? `
          <div class="phase-items">
            ${phase.items.map(item => `
              <label class="checklist-item ${item.done ? 'checked' : ''}" data-item="${item.id}" data-phase="${phase.id}">
                <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleItem('${phase.id}','${item.id}',this.checked)" />
                <span class="checklist-label">${esc(item.text)}</span>
              </label>
            `).join('')}
          </div>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  /* ── RENDER ALL ───────────────────────────────────────── */
  function renderAll() {
    renderStatus();
    renderActive();
    renderQueue();
    renderDone();
    renderAction();
    renderStats();
  }

  /* ── ACTIONS ──────────────────────────────────────────── */
  window.completeTask = function (list, id) {
    const arr = state[list];
    const idx = arr.findIndex(t => t.id === id);
    if (idx === -1) return;
    const [task] = arr.splice(idx, 1);
    task.ts = Date.now();
    state.done.push(task);
    save(state);
    renderAll();
    showToast('&#x2705; Task completed!');
  };

  window.moveTask = function (from, to, id) {
    const arr = state[from];
    const idx = arr.findIndex(t => t.id === id);
    if (idx === -1) return;
    const [task] = arr.splice(idx, 1);
    state[to].push(task);
    save(state);
    renderAll();
  };

  window.deleteTask = function (list, id) {
    state[list] = state[list].filter(t => t.id !== id);
    save(state);
    renderAll();
  };

  window.togglePhase = function (phaseId) {
    const p = state.phases.find(p => p.id === phaseId);
    if (p) { p.open = !p.open; save(state); renderAction(); }
  };

  window.toggleItem = function (phaseId, itemId, checked) {
    const p = state.phases.find(p => p.id === phaseId);
    if (!p) return;
    const item = p.items.find(i => i.id === itemId);
    if (!item) return;
    item.done = checked;
    save(state);
    renderAction();
    renderStats();
    if (checked) showToast('&#x2705; Action item checked off!');
  };

  /* ── MODAL ────────────────────────────────────────────── */
  const overlay = document.getElementById('modal-overlay');

  document.getElementById('fab-open').addEventListener('click', () => {
    overlay.classList.add('open');
    document.getElementById('new-task-name').focus();
  });

  document.getElementById('modal-cancel').addEventListener('click', () => {
    overlay.classList.remove('open');
    clearModal();
  });

  overlay.addEventListener('click', e => {
    if (e.target === overlay) { overlay.classList.remove('open'); clearModal(); }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { overlay.classList.remove('open'); clearModal(); }
  });

  document.getElementById('modal-add').addEventListener('click', addTask);
  document.getElementById('new-task-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  function addTask() {
    const name = document.getElementById('new-task-name').value.trim();
    const cat  = document.getElementById('new-task-cat').value;
    const note = document.getElementById('new-task-note').value.trim();
    if (!name) {
      document.getElementById('new-task-name').focus();
      return;
    }
    const task = { id: uid(), name, note: note || '', ts: Date.now() };
    state[cat].push(task);
    save(state);
    renderAll();
    overlay.classList.remove('open');
    clearModal();
    showToast('&#x2694;&#xFE0F; Task added!');
  }

  function clearModal() {
    document.getElementById('new-task-name').value = '';
    document.getElementById('new-task-note').value = '';
    document.getElementById('new-task-cat').value  = 'queue';
  }

  /* ── ESCAPE ───────────────────────────────────────────── */
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── CLOCK TICKER (updates "processing" feel) ────────── */
  // Re-render active panel every 30s to keep shimmer fresh
  setInterval(() => {
    renderStats();
  }, 30000);

  /* ── BOOT ─────────────────────────────────────────────── */
  renderAll();

})();
</script>
</body>
</html>
